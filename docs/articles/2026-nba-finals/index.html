<!DOCTYPE html>

<style>
:root{--bg:#F8F4EE;--card:#FFFDFB;--border:#E2D9CC;--text:#1C1713;--muted:#7A6F64;--accent:#006BB6}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Inter',-apple-system,"PingFang SC","Hiragino Sans GB",sans-serif;background:var(--bg);color:var(--text);display:flex;overflow:hidden}
.side{flex:0 0 256px;width:256px;height:100vh;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:18px 16px;transition:margin-left .28s cubic-bezier(.4,0,.2,1)}
.side-head{display:flex;align-items:center;gap:8px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.brand-btn{flex:1;display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;text-align:left;padding:4px;border-radius:6px;font-family:inherit;color:inherit}
.brand-btn:hover{background:var(--bg)}
.brand-btn .b{flex:0 0 auto;width:28px;height:28px;border-radius:6px;background:var(--accent);color:#fff;font-family:Georgia,serif;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:17px}
.brand-btn .t{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-weight:700;font-size:1.05rem;line-height:1.22}
.side-close{flex:0 0 auto;width:32px;height:32px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.side-close:hover{background:var(--bg);color:var(--accent);border-color:var(--accent)}
.nav-item{display:block;width:100%;text-align:left;font-family:inherit;font-size:.95rem;font-weight:600;padding:11px 14px;margin-bottom:6px;border:1px solid transparent;border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.is-on{background:var(--accent);color:#fff}
.side-foot{margin-top:auto;display:flex;flex-direction:column;gap:8px;padding-top:18px;border-top:1px solid var(--border)}
.side-foot a{font-size:.84rem;color:var(--muted);text-decoration:none}.side-foot a:hover{color:var(--accent)}
.frame-wrap{flex:1;height:100vh;position:relative}
iframe{width:100%;height:100%;border:none;display:block}
.side-toggle{position:fixed;top:14px;left:14px;z-index:60;height:40px;padding:0 14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;display:none;align-items:center;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.side-toggle:hover{color:var(--accent);border-color:var(--accent)}
.side-toggle .icon{font-size:18px;line-height:1}
body.collapsed .side{margin-left:-257px}
body.collapsed .side-toggle{display:inline-flex}
@media(max-width:760px){.side{position:fixed;z-index:55;box-shadow:0 0 40px rgba(0,0,0,.18)}body:not(.collapsed) .side-toggle{display:inline-flex}}
</style>
</head>
<body>
  <aside class="side">
    <div class="side-head">
      <button class="brand-btn" id="brand-toggle" title="Collapse"><span class="b">B</span><span class="t">2026 NBA Finals Player Performance Analysis</span></button>
      <button class="side-close" id="collapse" title="Collapse" aria-label="Collapse">&laquo;</button>
    </div>
    <nav><button class="nav-item" data-view="compare">Comparison</button><button class="nav-item" data-view="knicks">Knicks</button><button class="nav-item" data-view="spurs">Spurs</button><button class="nav-item" data-view="definitions">Metrics & Data</button></nav>
    <div class="side-foot">
      <a href="../../zh/articles/2026-nba-finals/index.html">中文</a>
      <a href="../../index.html">Site Home</a>
    </div>
  </aside>
  <button class="side-toggle" id="toggle"><span class="icon">&#9776;</span><span>Expand</span></button>
  <main class="frame-wrap"><iframe id="vf"></iframe></main>
<script>
var SRC={"knicks":"../2026-nba-finals-knicks-radars/index.html","spurs":"../2026-nba-finals-spurs-radars/index.html","compare":"../2026-nba-finals-compare/index.html","definitions":"../2026-nba-finals-definitions/index.html"};
var DEFAULT='compare';
var items=document.querySelectorAll('.nav-item'), vf=document.getElementById('vf');
function show(v){ if(!SRC[v])v=DEFAULT; vf.src=SRC[v];
  items.forEach(function(b){b.classList.toggle('is-on',b.dataset.view===v);});
  try{history.replaceState(null,'','#'+v);}catch(e){} }
items.forEach(function(b){b.addEventListener('click',function(){show(b.dataset.view); if(window.innerWidth<=760)document.body.classList.add('collapsed');});});
function collapse(){document.body.classList.add('collapsed');}
function expand(){document.body.classList.remove('collapsed');}
document.getElementById('collapse').addEventListener('click',collapse);
document.getElementById('brand-toggle').addEventListener('click',collapse);
document.getElementById('toggle').addEventListener('click',expand);
if(window.innerWidth<=760)document.body.classList.add('collapsed');
show((location.hash||'#'+DEFAULT).replace('#',''));
</script>
</body>
</html>
