  var sel={a:0,b:CFG.bdef}, mode='overlay';
  // series visibility: keyed side+'-'+baseline ; baseline in fin/pl/tm
  var vis={'a-fin':true,'a-pl':false,'a-tm':false,'b-fin':true,'b-pl':false,'b-tm':false};
  var COL={a:'#006BB6', b:'#F58426'};
  // distinct shade per baseline for readable contrast: finals darkest, team lightest
  var SHADE={a:{fin:'#013A66',pl:'#2E86C1',tm:'#86C0E6'}, b:{fin:'#9A3A00',pl:'#F58426',tm:'#FBC58F'}};
  var BASE=[{k:'fin',arr:'v',label:CFG.sFin,dash:''},{k:'pl',arr:'p',label:CFG.sPl,dash:'7 5'},{k:'tm',arr:'tm',label:CFG.sTm,dash:'2 5'}];

  var W=520,H=470,cx=260,cy=238,R=160;
  function pt(i,r){var a=-Math.PI/2+i*2*Math.PI/N;return [cx+Math.cos(a)*r,cy+Math.sin(a)*r];}
  function polyPath(arr){var d='';for(var i=0;i<N;i++){var xy=pt(i,norm(arr,i)*R);d+=(i?'L':'M')+xy[0].toFixed(1)+' '+xy[1].toFixed(1)+' ';}return d+'Z';}
  function series(arr,color,dash,fillOp){
    var dots='';for(var j=0;j<N;j++){var c=pt(j,norm(arr,j)*R);dots+='<circle cx="'+c[0].toFixed(1)+'" cy="'+c[1].toFixed(1)+'" r="3" fill="'+color+'"/>';}
    return '<path d="'+polyPath(arr)+'" fill="'+color+'" fill-opacity="'+fillOp+'" stroke="'+color+'" stroke-width="2.3" stroke-linejoin="round"'+(dash?' stroke-dasharray="'+dash+'"':'')+'/>'+dots;
  }
  function grid(){
    var g='';
    for(var k=1;k<=4;k++){var rr=R*k/4,ring='';for(var i=0;i<N;i++){var xy=pt(i,rr);ring+=(i?'L':'M')+xy[0].toFixed(1)+' '+xy[1].toFixed(1)+' ';}g+='<path d="'+ring+'Z" fill="none" stroke="#E2D9CC" stroke-width="1"/>';}
    for(var i=0;i<N;i++){var e=pt(i,R);g+='<line x1="'+cx+'" y1="'+cy+'" x2="'+e[0].toFixed(1)+'" y2="'+e[1].toFixed(1)+'" stroke="#E2D9CC" stroke-width="1"/>';
      var lp=pt(i,R+24),an='middle';if(lp[0]>cx+12)an='start';else if(lp[0]<cx-12)an='end';
      var sub=CFG.short_en[i]||'';if(sub){g+='<text x="'+lp[0].toFixed(1)+'" y="'+(lp[1]-7).toFixed(1)+'" text-anchor="'+an+'" font-size="12" font-weight="600" fill="#1C1713" dominant-baseline="middle">'+CFG.short[i]+'</text>';g+='<text x="'+lp[0].toFixed(1)+'" y="'+(lp[1]+8).toFixed(1)+'" text-anchor="'+an+'" font-size="10" font-weight="600" fill="#7A6F64" letter-spacing=".04em" dominant-baseline="middle">'+sub+'</text>';}else{g+='<text x="'+lp[0].toFixed(1)+'" y="'+lp[1].toFixed(1)+'" text-anchor="'+an+'" font-size="12" font-weight="600" fill="#7A6F64" dominant-baseline="middle">'+CFG.short[i]+'</text>';}}
    return g;
  }
  function svgFor(sides){
    // sides: array of 'a'/'b'; draw all visible baselines for each
    var body=grid();
    sides.forEach(function(side){
      var p=PLAYERS[sel[side]];
      BASE.forEach(function(b){
        if(!vis[side+'-'+b.k]) return;
        var fillOp = b.k==='fin'?0.13:0.0;
        body+=series(p[b.arr], SHADE[side][b.k], b.dash, fillOp);
      });
    });
    return '<svg viewBox="0 0 '+W+' '+H+'">'+body+'</svg>';
  }

  function drawRadars(){
    var wrap=document.getElementById('radar-wrap');
    if(mode==='overlay'){
      wrap.className='radar-wrap';
      wrap.innerHTML='<div class="radar-card">'+svgFor(['a','b'])+'</div>';
    }else{
      wrap.className='radar-wrap split';
      wrap.innerHTML='<div class="radar-card"><h3 style="color:var(--accent)">'+PLAYERS[sel.a].n+'</h3>'+svgFor(['a'])+'</div>'+
                     '<div class="radar-card"><h3 style="color:var(--warm)">'+PLAYERS[sel.b].n+'</h3>'+svgFor(['b'])+'</div>';
    }
  }

  function tableOverlay(){
    var A=PLAYERS[sel.a],B=PLAYERS[sel.b],h='<table><thead><tr><th>'+CFG.thead[0]+'</th><th>'+CFG.thead[1]+'</th><th>'+CFG.thead[2]+'</th><th>'+CFG.thead[3]+'</th></tr></thead><tbody>';
    for(var i=0;i<N;i++){
      var e=A.v[i]===B.v[i]?'t':(A.v[i]>B.v[i]?'a':'b');
      var edge=e==='a'?'<span class="edge-a">'+CFG.edgeA+'</span>':e==='b'?'<span class="edge-b">'+CFG.edgeB+'</span>':'<span class="edge-t">'+CFG.tie+'</span>';
      h+='<tr><td class="metric" title="'+CFG.defs[i]+'">'+CFG.labels[i]+'</td><td class="num va">'+fmt(A.v[i],i)+'</td><td class="num vb">'+fmt(B.v[i],i)+'</td><td class="edge">'+edge+'</td></tr>';
    }
    return h+'</tbody></table>';
  }
  function tableFor(side){
    var p=PLAYERS[sel[side]], cls=side==='a'?'a':'b', col=side==='a'?'va':'vb';
    var h='<div><div class="tcap '+cls+'">'+p.n+'</div><table><thead><tr><th>'+CFG.thead[0]+'</th><th>'+CFG.sFin+'</th><th>'+CFG.sPl+'</th><th>'+CFG.sTm+'</th></tr></thead><tbody>';
    for(var i=0;i<N;i++){
      h+='<tr><td class="metric" title="'+CFG.defs[i]+'">'+CFG.labels[i]+'</td><td class="num '+col+'">'+fmt(p.v[i],i)+'</td><td class="num">'+fmt(p.p[i],i)+'</td><td class="num">'+fmt(p.tm[i],i)+'</td></tr>';
    }
    return h+'</tbody></table></div>';
  }
  function drawTable(){
    var c=document.getElementById('table-card');
    if(mode==='overlay'){c.className='table-card';c.innerHTML=tableOverlay();}
    else{c.className='table-card';c.innerHTML='<div class="tbl-split">'+tableFor('a')+tableFor('b')+'</div>';}
  }

  function buildToggles(){
    var box=document.getElementById('series-toggles'); box.innerHTML='';
    ['a','b'].forEach(function(side){
      BASE.forEach(function(b){
        var key=side+'-'+b.k;
        var btn=document.createElement('button');
        btn.className='stog'+(vis[key]?'':' off'); btn.dataset.key=key;
        var nm=PLAYERS[sel[side]].n.length>5?(side==='a'?'A':'B'):PLAYERS[sel[side]].n;
        btn.innerHTML='<i style="background:'+SHADE[side][b.k]+'"></i>'+(side==='a'?'A':'B')+'·'+b.label;
        btn.addEventListener('click',function(){vis[key]=!vis[key];btn.classList.toggle('off',!vis[key]);drawRadars();});
        box.appendChild(btn);
      });
    });
  }

  function refreshSide(side){
    var p=PLAYERS[sel[side]], pk=document.querySelector('.pk[data-side="'+side+'"]');
    if(pk){
      pk.querySelector('[data-name]').textContent=p.n;
      pk.querySelector('[data-sub]').textContent=teamName(p.t)+' · '+p.pos+' · '+p.mpg+(isEN?' MPG':' 分钟');
    }
    var stats=document.querySelector('.stat-mini[data-stats][data-side="'+side+'"]');
    if(stats) stats.innerHTML=(p.c||[]).map(function(c){return '<div class="m"><b>'+c[0]+'</b><span>'+c[1]+'</span></div>';}).join('');
  }
  function pp(x){return (x>=0?'+':'')+x.toFixed(1);}
  function gradeScore(p){
    var ts=p.v[0], usg=p.v[1], pm=p.v[6], pie=p.v[9];
    var mpgChip=(p.c||[])[0]; var mpg=mpgChip?parseFloat(mpgChip[0])||0:0;
    // 1) Volume tier — high-load roles weight efficiency more
    var vt = (usg>=28||mpg>=36)?1.0 : (usg>=22||mpg>=30)?0.7 : (mpg>=18)?0.45 : 0.25;
    // 2) Absolute efficiency credit (NOT vs own playoff)
    var ec = ts>=62?12 : ts>=58?8 : ts>=54?4 : ts>=50?0 : ts>=46?-4 : ts>=42?-9 : -14;
    // 3) On-court impact: +/- and PIE absolute
    var pmC=Math.max(-15,Math.min(15,pm));
    var im = pmC*0.8 + (pie>=18?(pie-18)*1.5 : pie>=12?(pie-12)*0.6 : (pie-12)*1.4);
    // 4) Role-fit bonus: efficient role player OR efficient star
    var rb = 0;
    if(usg<22 && ts>=60 && mpg>=20) rb+=4;
    if(usg>=28 && ts>=55) rb+=5;
    if(usg>=32 && ts>=53) rb+=4; // alpha creator threshold
    // 5) Series outcome — known winning-key context
    var won = CFG.seriesWinner===p.t;
    var fmvp = CFG.fmvp===p.n;
    var som = 0;
    if(won) som+=6;
    if(fmvp) som+=14;                       // FMVP is a categorical signal, weight it
    if(!won && usg>=28 && pm<=-3) som-=4;   // alpha on losing side, dragged team
    if(!won && mpg<15) som-=1;              // small-sample loss
    return vt*ec + im + rb + som;
  }
  function gradeFor(p){
    var s=gradeScore(p);
    var mpgChip=(p.c||[])[0]; var mpg=mpgChip?parseFloat(mpgChip[0])||0:0;
    if(mpg<12) s=Math.max(-8, Math.min(4, s));  // small-sample clamp to [C+..B]
    if(s>=26) return 'A+'; if(s>=20) return 'A';  if(s>=14) return 'A-';
    if(s>=8)  return 'B+'; if(s>=2)  return 'B';  if(s>=-4) return 'B-';
    if(s>=-10)return 'C+'; if(s>=-16)return 'C';  if(s>=-22)return 'D';
    return 'F';
  }
  function gradeLine(p,g){
    var ts=p.v[0], usg=p.v[1], pm=p.v[6], pie=p.v[9];
    var won = CFG.seriesWinner===p.t;
    var isFmvp = CFG.fmvp===p.n;
    var tag = isFmvp ? CFG.fmvpTag : '';
    var outcome = won ? CFG.winTag : CFG.lossTag;
    return isEN
      ? 'Finals grade '+g+tag+' — TS% '+ts.toFixed(1)+'%, USG '+usg.toFixed(1)+'%, +/- '+pp(pm)+', PIE '+pie.toFixed(1)+'%; '+outcome+'.'
      : '总决赛评级 '+g+tag+' —— 真实命中率 '+ts.toFixed(1)+'%、使用率 '+usg.toFixed(1)+'%、正负值 '+pp(pm)+'、PIE '+pie.toFixed(1)+'%；'+outcome+'。';
  }
  function compareProse(self, other, selfSide){
    var same=self.t===other.t;
    var L=isEN?{
      sameLead:'Same-roster matchup vs '+other.n+'.',
      crossLead:'Cross-team head-to-head with '+other.n+'.',
      usgUp:function(g,s){return 'Carries the bigger offensive load — USG '+pp(g)+'pp, finishing '+pp(s)+'pp more of team scoring.';},
      usgDown:function(g,s){return 'Plays the lower-usage role — USG '+pp(g)+'pp, '+pp(s)+'pp of team scoring vs '+other.n+'.';},
      tsUp:function(g){return 'Stays more efficient on those touches (TS% '+pp(g)+'pp).';},
      tsDown:function(g){return 'Pays for it in efficiency — TS% '+pp(g)+'pp behind.';},
      tsEven:'Efficiency is a wash (TS% within a point).',
      ast:function(g){return g>0?'Creates more for teammates (AST% '+pp(g)+'pp).':'Cedes the playmaking — AST% '+pp(g)+'pp.';},
      reb:function(g){return g>0?'Wins the glass (REB% '+pp(g)+'pp).':'Gives up the boards (REB% '+pp(g)+'pp).';},
      def:function(stops,disc,sec){return 'Defensive read: Def. Stops '+pp(stops)+', Foul Discipline '+pp(disc)+', Ball Security '+pp(sec)+' vs '+other.n+'.';},
      impact:function(pm,pie){return 'On-court net '+pp(pm)+' and PIE '+pp(pie)+'pp relative to '+other.n+'.';}
    }:{
      sameLead:'队内对位 '+other.n+' 的横向读法。',
      crossLead:'跨队对位 '+other.n+' 的系列赛直接对比。',
      usgUp:function(g,s){return '承担更重的进攻负荷——使用率高 '+pp(g)+'pp，队内得分占比多 '+pp(s)+'pp。';},
      usgDown:function(g,s){return '走低使用率角色——使用率 '+pp(g)+'pp，队内得分占比 '+pp(s)+'pp（相对 '+other.n+'）。';},
      tsUp:function(g){return '在更高负荷下仍更高效（真实命中率 '+pp(g)+'pp）。';},
      tsDown:function(g){return '效率被压制——真实命中率落后 '+pp(g)+'pp。';},
      tsEven:'两人效率几乎打平（真实命中率差距 <1pp）。',
      ast:function(g){return g>0?'组织端更突出（助攻率高 '+pp(g)+'pp）。':'让出组织权——助攻率 '+pp(g)+'pp。';},
      reb:function(g){return g>0?'篮板端占优（篮板率 '+pp(g)+'pp）。':'让出篮板——篮板率 '+pp(g)+'pp。';},
      def:function(stops,disc,sec){return '防守三项相对 '+other.n+'：防守压制 '+pp(stops)+'、犯规节制 '+pp(disc)+'、护球率 '+pp(sec)+'。';},
      impact:function(pm,pie){return '在场净胜 '+pp(pm)+' 分、PIE '+pp(pie)+'pp 相对于 '+other.n+'。';}
    };
    var dUsg=self.v[1]-other.v[1], dShare=self.v[3]-other.v[3];
    var dTs=self.v[0]-other.v[0], dAst=self.v[2]-other.v[2], dReb=self.v[4]-other.v[4];
    var dSec=self.v[5]-other.v[5], dPm=self.v[6]-other.v[6], dStops=self.v[7]-other.v[7], dDisc=self.v[8]-other.v[8], dPie=self.v[9]-other.v[9];
    var lines=[];
    lines.push(same?L.sameLead:L.crossLead);
    lines.push(dUsg>=0?L.usgUp(dUsg,dShare):L.usgDown(dUsg,dShare));
    if(Math.abs(dTs)<1) lines.push(L.tsEven); else lines.push(dTs>0?L.tsUp(dTs):L.tsDown(dTs));
    if(Math.abs(dAst)>=Math.abs(dReb)) lines.push(L.ast(dAst)); else lines.push(L.reb(dReb));
    lines.push(L.def(dStops,dDisc,dSec));
    lines.push(L.impact(dPm,dPie));
    return lines.join(' ');
  }
  function drawEvals(){
    var w=document.getElementById('eval-wrap'); if(!w) return;
    var pa=PLAYERS[sel.a], pb=PLAYERS[sel.b];
    function card(side){
      var self=side==='a'?pa:pb, other=side==='a'?pb:pa;
      var col=side==='a'?'#006BB6':'#F58426';
      var g=gradeFor(self);
      var head=
        '<header>'
          +'<div class="grade" style="background:'+col+'">'+g+'</div>'
          +'<div class="meta"><span class="tag" style="color:'+col+'">'+CFG.evalLabel+'</span><h4>'+self.n+'</h4></div>'
        +'</header>';
      var body='<p class="grade-line">'+gradeLine(self,g)+'</p><p>'+compareProse(self,other,side)+'</p>';
      return '<article class="eval-card" style="border-left-color:'+col+'">'+head+body+'</article>';
    }
    w.innerHTML=card('a')+card('b');
  }
  function render(){refreshSide('a');refreshSide('b');buildToggles();drawRadars();drawEvals();drawTable();buildPop('a');buildPop('b');}

  // Two-team popover picker. Both Knicks + Spurs (with all players) are visible
  // simultaneously when the popover opens; same neutral button style for every opt.
  function buildPop(side){
    var pop=document.querySelector('.pk-pop[data-side="'+side+'"]'); if(!pop) return;
    pop.innerHTML='';
    [['knicks',CFG.knicks],['spurs',CFG.spurs]].forEach(function(tm){
      var grp=document.createElement('div'); grp.className='team-grp';
      var h=document.createElement('div'); h.className='team-h'; h.textContent=tm[1]; grp.appendChild(h);
      var opts=document.createElement('div'); opts.className='opts';
      PLAYERS.forEach(function(p,i){
        if(p.t!==tm[0]) return;
        var b=document.createElement('button'); b.type='button';
        b.className='opt'+(sel[side]===i?' is-sel':'');
        b.textContent=p.n;
        b.addEventListener('mousedown',function(e){e.preventDefault();sel[side]=i;closePop(side);render();});
        opts.appendChild(b);
      });
      grp.appendChild(opts); pop.appendChild(grp);
    });
  }
  function openPop(side){
    closePop(side==='a'?'b':'a');
    var pop=document.querySelector('.pk-pop[data-side="'+side+'"]'); if(pop) pop.classList.add('open');
  }
  function closePop(side){
    var pop=document.querySelector('.pk-pop[data-side="'+side+'"]'); if(pop) pop.classList.remove('open');
  }
  document.querySelectorAll('.pk-pick').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var side=btn.dataset.side;
      var pop=document.querySelector('.pk-pop[data-side="'+side+'"]');
      if(pop.classList.contains('open')) closePop(side); else openPop(side);
    });
  });
  document.addEventListener('click',function(e){
    if(e.target.closest('.pk-pop')||e.target.closest('.pk-pick')) return;
    closePop('a'); closePop('b');
  });

  document.querySelectorAll('.seg-btn').forEach(function(b){
    b.addEventListener('click',function(){
      mode=b.dataset.mode;
      document.querySelectorAll('.seg-btn').forEach(function(x){x.classList.toggle('is-on',x===b);});
      // in split mode default-show each player's playoff+team too
      if(mode==='split'){vis['a-pl']=true;vis['a-tm']=true;vis['b-pl']=true;vis['b-tm']=true;}
      else{vis['a-pl']=false;vis['a-tm']=false;vis['b-pl']=false;vis['b-tm']=false;}
      buildToggles();drawRadars();drawTable();
    });
  });
  render();
})();
</script>
</body>
