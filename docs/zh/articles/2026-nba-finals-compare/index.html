      var low = CFG.higher[i]?'':'<span class="lowtag">'+CFG.lower+'</span>';
      html+='<tr><td class="metric">'+CFG.labels[i]+low+'</td><td class="va">'+A.raw[i]+'</td><td class="vb">'+B.raw[i]+'</td><td class="edge">'+edge+'</td></tr>';
    }
    document.getElementById('cmp-rows').innerHTML=html;
  }
  function refreshSide(side){
    var idx=sel[side], p=PLAYERS[idx];
    var pk=document.querySelector('.pk[data-side="'+side+'"]');
    pk.querySelector('[data-name]').textContent=p.n;
    pk.querySelector('[data-sub]').textContent=teamName(p.t)+' · '+p.pos.split('·').slice(-1)[0].trim()+' · '+p.mpg+(/[0-9]/.test(p.mpg)?(document.documentElement.lang==='en'?' MPG':' 分钟'):'');
    document.querySelector('[data-leg="'+side+'"]').textContent=p.n;
  }
  function render(){ refreshSide('a'); refreshSide('b'); drawRadar(); renderTable(); }
  // build option lists + wire pickers
  document.querySelectorAll('.pk').forEach(function(pk){
    var side=pk.dataset.side, list=pk.querySelector('.pk-list'), input=pk.querySelector('.pk-input');
    PLAYERS.forEach(function(p,i){
      var o=document.createElement('div'); o.className='pk-opt'; o.dataset.i=i;
      o.innerHTML='<span>'+p.n+'</span><span class="tm">'+teamName(p.t)+'</span>';
      o.addEventListener('mousedown',function(e){e.preventDefault(); sel[side]=i; input.value=''; filter(list,''); list.classList.remove('open'); render();});
      list.appendChild(o);
    });
    input.addEventListener('focus',function(){filter(list,input.value);list.classList.add('open');});
    input.addEventListener('input',function(){filter(list,input.value);list.classList.add('open');});
    input.addEventListener('blur',function(){setTimeout(function(){list.classList.remove('open');},150);});
  });
  function filter(list,q){
    q=(q||'').trim().toLowerCase();
    list.querySelectorAll('.pk-opt').forEach(function(o){
      o.hidden = q && o.textContent.toLowerCase().indexOf(q)===-1;
    });
  }
  render();
})();
</script>
</body>
</html>
