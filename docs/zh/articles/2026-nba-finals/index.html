<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 NBA 总决赛球员表现分析 | benedict23</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2032%2032%27%3E%3Crect%20width%3D%2732%27%20height%3D%2732%27%20rx%3D%277%27%20fill%3D%27%23006BB6%27/%3E%3Ctext%20x%3D%2716%27%20y%3D%2724%27%20font-family%3D%27Georgia%2C%22Times%20New%20Roman%22%2Cserif%27%20font-size%3D%2723%27%20font-weight%3D%27700%27%20fill%3D%27%23FFFDFB%27%20text-anchor%3D%27middle%27%3EB%3C/text%3E%3C/svg%3E">
<style>
:root{--bg:#F8F4EE;--card:#FFFDFB;--border:#E2D9CC;--text:#1C1713;--muted:#7A6F64;--accent:#006BB6}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Inter',-apple-system,"PingFang SC","Hiragino Sans GB",sans-serif;background:var(--bg);color:var(--text);display:flex;overflow:hidden}
.side{flex:0 0 248px;width:248px;height:100vh;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 18px;transition:margin-left .28s cubic-bezier(.4,0,.2,1)}
.brand{font-family:'Playfair Display',Georgia,serif;font-style:italic;font-weight:700;font-size:1.18rem;line-height:1.22;color:var(--text);margin-bottom:22px;display:flex;align-items:flex-start;gap:10px}
.brand .b{flex:0 0 auto;width:26px;height:26px;border-radius:6px;background:var(--accent);color:#fff;font-family:Georgia,serif;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:16px;font-style:normal;margin-top:2px}
.nav-item{display:block;width:100%;text-align:left;font-family:inherit;font-size:.95rem;font-weight:600;padding:11px 14px;margin-bottom:6px;border:1px solid transparent;border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.is-on{background:var(--accent);color:#fff}
.side-foot{margin-top:auto;display:flex;flex-direction:column;gap:8px;padding-top:18px;border-top:1px solid var(--border)}
.side-foot a{font-size:.84rem;color:var(--muted);text-decoration:none}.side-foot a:hover{color:var(--accent)}
.frame-wrap{flex:1;height:100vh}
iframe{width:100%;height:100%;border:none;display:block}
.side-toggle{position:fixed;top:14px;left:14px;z-index:60;width:40px;height:40px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center}
body.collapsed .side{margin-left:-249px}
body.collapsed .side-toggle{display:flex}
.collapse-btn{font-family:inherit;font-size:.8rem;color:var(--muted);background:none;border:none;cursor:pointer;text-align:left;padding:0}
.collapse-btn:hover{color:var(--accent)}
@media(max-width:760px){.side{position:fixed;z-index:55;box-shadow:0 0 40px rgba(0,0,0,.18)}body:not(.collapsed) .side-toggle{display:flex}}
</style>
</head>
<body>
  <aside class="side">
    <div class="brand"><span class="b">B</span><span>2026 NBA 总决赛球员表现分析</span></div>
    <nav><button class="nav-item" data-view="knicks">尼克斯表现</button><button class="nav-item" data-view="spurs">马刺表现</button><button class="nav-item" data-view="compare">球员对比</button></nav>
    <div class="side-foot">
      <button class="collapse-btn" id="collapse">&larr; 收起菜单</button>
      <a href="../../../articles/2026-nba-finals/index.html">English</a>
      <a href="../../index.html">站点首页</a>
    </div>
  </aside>
  <button class="side-toggle" id="toggle">&#9776;</button>
  <main class="frame-wrap"><iframe id="vf"></iframe></main>
<script>
var SRC={"knicks":"../2026-nba-finals-knicks-radars/index.html","spurs":"../2026-nba-finals-spurs-radars/index.html","compare":"../2026-nba-finals-compare/index.html"};
var items=document.querySelectorAll('.nav-item'), vf=document.getElementById('vf');
function show(v){ if(!SRC[v])v='knicks'; vf.src=SRC[v];
  items.forEach(function(b){b.classList.toggle('is-on',b.dataset.view===v);});
  try{history.replaceState(null,'','#'+v);}catch(e){} }
items.forEach(function(b){b.addEventListener('click',function(){show(b.dataset.view); if(window.innerWidth<=760)document.body.classList.add('collapsed');});});
document.getElementById('collapse').addEventListener('click',function(){document.body.classList.add('collapsed');});
document.getElementById('toggle').addEventListener('click',function(){document.body.classList.remove('collapsed');});
if(window.innerWidth<=760)document.body.classList.add('collapsed');
show((location.hash||'#knicks').replace('#',''));
</script>
</body>
</html>
